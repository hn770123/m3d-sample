<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホでの拡大縮小を防止し、画面サイズに合わせる -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone Safari 3D Rendering Test (Parallel Viewing)</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.jsをESモジュールとして読み込むためのインポートマップ -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="header-controls">
        <button id="btn-mode">明</button>
        <button id="btn-large">大</button>
        <button id="btn-small">小</button>
        <button id="btn-fast">速</button>
        <button id="btn-slow">遅</button>
        <button id="btn-reload">更新</button>
    </div>
    <!-- メインのスクリプトをモジュールとして読み込む -->
    <script type="module" src="main.js"></script>
</body>
</html>
